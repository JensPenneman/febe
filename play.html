<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Febe" />
  <link rel="apple-touch-icon" href="icon.png" />
  <title>Febe — Luister &amp; Leer</title>
  <link rel="stylesheet" href="style.css" />
  <script src="data.js"></script>
</head>
<body>
  <header>
    <a id="back-link" href="index.html" class="back-link">&larr; Terug</a>
    <h1 id="page-title"></h1>
  </header>

  <main id="play-content" class="play-content"></main>

  <script>
    const nativeLabels = {
      sq: "Gjuha jote",
      bs: "Tvoj jezik",
      ru: "\u0422\u0432\u043E\u0439 \u044F\u0437\u044B\u043A",
      en: "Your language",
    };

    const params = new URLSearchParams(window.location.search);
    const taskId = params.get("task");
    const childId = params.get("child");

    const task = APP_DATA.tasks.find((t) => t.id === taskId);
    const child = APP_DATA.children.find((c) => c.id === childId);

    if (!task || !child) {
      document.getElementById("page-title").textContent = "Niet gevonden";
    } else {
      document.getElementById("back-link").href = `task.html?id=${task.id}`;
      const titleEl = document.getElementById("page-title");
      const titleImg = document.createElement("img");
      titleImg.src = child.symbol;
      titleImg.alt = child.name;
      titleImg.className = "title-icon";
      titleEl.appendChild(titleImg);
      titleEl.appendChild(document.createTextNode(` ${child.name}`));

      const nativeSteps = task.steps[child.languageCode];
      const dutchSteps = task.steps.nl;
      const content = document.getElementById("play-content");
      const isDutch = child.languageCode === "nl";

      if (!nativeSteps) {
        content.innerHTML = "<p>Geen vertaling beschikbaar.</p>";
      } else {
        nativeSteps.forEach((nativeText, i) => {
          const step = document.createElement("div");
          step.className = "step-card";

          const stepNum = document.createElement("span");
          stepNum.className = "step-number";
          stepNum.textContent = i + 1;
          step.appendChild(stepNum);

          const stepBody = document.createElement("div");
          stepBody.className = "step-body";

          if (isDutch) {
            // Dutch speaker — single line with play button
            stepBody.appendChild(createStepLine(dutchSteps[i], "nl"));
          } else {
            // Non-Dutch speaker — native line, then Dutch line
            stepBody.appendChild(createStepLine(nativeText, child.languageCode));
            const dutchLine = createStepLine(dutchSteps[i], "nl");
            dutchLine.classList.add("step-line-dutch");
            stepBody.appendChild(dutchLine);
          }

          step.appendChild(stepBody);
          content.appendChild(step);
        });
      }

      // Big green "done" button
      const doneBtn = document.createElement("a");
      doneBtn.href = "scan.html";
      doneBtn.className = "done-btn";
      doneBtn.textContent = "\u2714\uFE0F Klaar!";
      content.appendChild(doneBtn);
    }

    function createStepLine(text, langCode) {
      const line = document.createElement("div");
      line.className = "step-line";

      const playBtn = document.createElement("button");
      playBtn.className = "play-btn play-btn-sm";
      playBtn.setAttribute("aria-label", `Luister: ${text}`);
      playBtn.innerHTML = `<span class="play-icon">\u25B6\uFE0F</span>`;
      playBtn.addEventListener("click", () => speak(text, langCode, playBtn));
      line.appendChild(playBtn);

      const textEl = document.createElement("p");
      textEl.className = "step-text";
      textEl.lang = langCode;
      textEl.textContent = text;
      line.appendChild(textEl);

      return line;
    }

    function speak(text, langCode, btn) {
      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = langCode;
      utterance.rate = 0.85;

      btn.classList.add("playing");
      utterance.onend = () => btn.classList.remove("playing");
      utterance.onerror = () => btn.classList.remove("playing");

      window.speechSynthesis.speak(utterance);
    }
  </script>
</body>
</html>
